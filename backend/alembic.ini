# Alembic configuration.
# sqlalchemy.url умышленно не задан здесь — он будет прочитан из env-переменной
# DATABASE_URL через env.py (добавляется в шаге 1.3).
[alembic]
script_location = alembic
prepend_sys_path = .

[loggers]
keys = root

[formatters]
keys = generic

[handlers]
keys = console

[logger_root]
level = WARN
handlers = console
qualname =

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic
