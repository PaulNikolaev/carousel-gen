# Стек для тестов. Работает параллельно с основным (другой project name, сеть, тома).
# Запуск: docker compose -f docker-compose.test.yml up -d
# Логи:   docker compose -f docker-compose.test.yml logs backend
# Остановка: docker compose -f docker-compose.test.yml down / down -v
name: carousel-gen-test

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-carousel_test}
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - backend/.env.test
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/${POSTGRES_DB:-carousel_test}
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["alembic", "upgrade", "head"]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - backend/.env.test
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/${POSTGRES_DB:-carousel_test}
      PYTEST_CACHE_DIR: /tmp/.pytest_cache
    depends_on:
      migrate:
        condition: service_completed_successfully
    entrypoint:
      - python
      - -m
      - pytest
      - tests
      - -v
      - -o
      - cache_dir=/tmp/.pytest_cache
      - -o
      - asyncio_default_fixture_loop_scope=function

volumes:
  postgres_test_data:
